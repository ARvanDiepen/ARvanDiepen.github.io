<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>DroneSim | WebGL</title>
  <style>
    body { margin: 0; padding: 0; background-color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }

    #unity-container { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }

    #unity-canvas { display: block; background: #000; }

    /* UI overlay styling */
    .ui-panel { margin-top: 20px; text-align: center; }

    #unity-fullscreen-button {
      padding: 10px 20px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    #unity-fullscreen-button:hover { background: #34495e; }

    #unity-loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; }
    #unity-progress-bar-empty { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
    #unity-progress-bar-full { height: 100%; background: #3498db; width: 0%; }
  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas" width=960 height=600></canvas>
  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
</div>

<div class="ui-panel">
  <h1>DroneSim</h1>
  <button id="unity-fullscreen-button">Fullscreen Modus</button>
</div>

<script>
  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/WebDroneSim4.loader.js";
  // OPGELOST: Hier is de canvas variabele gedefinieerd:
  var canvas = document.querySelector("#unity-canvas");

  var config = {
    dataUrl: buildUrl + "/WebDroneSim4.data",
    frameworkUrl: buildUrl + "/WebDroneSim4.framework.js",
    codeUrl: buildUrl + "/WebDroneSim4.wasm",
    companyName: "DefaultCompany",
    productName: "DroneSim",
    productVersion: "0.1.0",
  };

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      document.querySelector("#unity-loading-bar").style.display = "none";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => { alert(message); });
  };
  document.body.appendChild(script);
</script>
</body>
</html>
