<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; }

    /* Zorgt dat de player niet meer de hele browser forceert */
    #unity-container {
      width: 960px;
      height: 600px;
      margin: 0 auto;
      position: relative;
      border: 2px solid #333;
    }

    #unity-canvas { width: 100%; height: 100%; display: block; }

    /* De knop positioneren */
    #fullscreen-button {
      position: absolute;
      bottom: 10px;
      right: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <button id="fullscreen-button">Fullscreen</button>
</div>

<script src="Build/WebDroneSim4.loader.js"></script>
<script>
  var canvas = document.querySelector("#unity-canvas");
  var fullscreenBtn = document.querySelector("#fullscreen-button");
  var myUnityInstance = null; // Opslag voor de instance

  var config = {
    dataUrl: "Build/WebDroneSim4.data",
    frameworkUrl: "Build/WebDroneSim4.framework.js",
    codeUrl: "Build/WebDroneSim4.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "DroneSim",
    productVersion: "0.1",
  };

  function tryStartUnity() {
    if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
      console.log("Canvas is ready, starting Unity...");
      createUnityInstance(canvas, config, (progress) => {
        console.log("Loading: " + (100 * progress) + "%");
      }).then((unityInstance) => {
        myUnityInstance = unityInstance;
        console.log("Unity loaded successfully");

        // Koppel de fullscreen knop nu de instance geladen is
        fullscreenBtn.onclick = () => {
          myUnityInstance.SetFullscreen(1);
        };
      }).catch((message) => {
        alert(message);
      });
    } else {
      setTimeout(tryStartUnity, 50);
    }
  }

  tryStartUnity();
</script>
</body>
</html>
