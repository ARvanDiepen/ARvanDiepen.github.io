<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player</title>
  <style>
    /* Forceer de container en het canvas om altijd een grootte te hebben */
    body { margin: 0; padding: 0; overflow: hidden; }
    #unity-container { width: 100vw; height: 100vh; position: relative; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<script src="Build/WebDroneSim4.loader.js"></script> <!-- Pas deze naam aan naar jouw build -->
<script>
  var canvas = document.querySelector("#unity-canvas");
  var config = {
    dataUrl: "Build/WebDroneSim4.data",
    frameworkUrl: "Build/WebDroneSim4.framework.js",
    codeUrl: "Build/WebDroneSim4.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "DroneSim",
    productVersion: "0.1",
  };

  // Functie die checkt of het canvas klaar is voor initialisatie
  function tryStartUnity() {
    // Check of het canvas breedte/hoogte heeft ( > 0 )
    if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
      console.log("Canvas is ready, starting Unity...");
      createUnityInstance(canvas, config, (progress) => {
        console.log("Loading: " + (100 * progress) + "%");
      }).then((unityInstance) => {
        console.log("Unity loaded successfully");
      }).catch((message) => {
        alert(message);
      });
    } else {
      // Wacht 50ms en probeer opnieuw
      console.log("Waiting for canvas to be ready...");
      setTimeout(tryStartUnity, 50);
    }
  }

  // Start het poll-proces
  tryStartUnity();
</script>
</body>
</html>
