<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>DroneSim Web</title>
  <style>
    :root {
      --bg-color: #121212;
      --panel-color: #1e1e1e;
      --accent-color: #007bff;
      --text-color: #e0e0e0;
    }

    body { margin: 0; padding: 0; background: var(--bg-color); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    #unity-container {
      width: 90%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      position: relative;
      background: var(--panel-color);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #unity-canvas { width: 100%; height: 100%; display: block; }

    /* Loading Overlay */
    #loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--bg-color); z-index: 10; transition: opacity 0.5s;
    }
    #progress-bar { width: 50%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 20px; }
    #progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.2s; }

    /* Knop */
    #fullscreen-button {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.6); color: white; border: 1px solid #444;
      padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.3s;
    }
    #fullscreen-button:hover { background: var(--accent-color); border-color: var(--accent-color); }
  </style>
</head>
<body>

<div id="unity-container">
  <div id="loading-overlay">
    <h2 style="color:white; margin:0;">DroneSim Loading</h2>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <button id="fullscreen-button">Fullscreen</button>
</div>

<script src="Build/WebDroneSim4.loader.js"></script>
<script>
  var canvas = document.querySelector("#unity-canvas");
  var progressFill = document.querySelector("#progress-fill");
  var loadingOverlay = document.querySelector("#loading-overlay");
  var fullscreenBtn = document.querySelector("#fullscreen-button");
  var myUnityInstance = null;

  var config = {
    dataUrl: "Build/WebDroneSim4.data",
    frameworkUrl: "Build/WebDroneSim4.framework.js",
    codeUrl: "Build/WebDroneSim4.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "DroneSim",
    productVersion: "0.1",
  };

  function tryStartUnity() {
    if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
      createUnityInstance(canvas, config, (progress) => {
        progressFill.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        myUnityInstance = unityInstance;
        loadingOverlay.style.opacity = "0";
        setTimeout(() => loadingOverlay.style.display = "none", 500);

        fullscreenBtn.onclick = () => myUnityInstance.SetFullscreen(1);
      }).catch((message) => alert(message));
    } else {
      setTimeout(tryStartUnity, 50);
    }
  }

  tryStartUnity();
</script>
</body>
</html>
